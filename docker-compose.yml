services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
